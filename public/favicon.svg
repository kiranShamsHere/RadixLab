<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <radialGradient id="meshGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Deep Obsidian background -->
  <rect width="100%" height="100%" fill="#060813" rx="128" />

  <!-- Ambient Glow overlay -->
  <circle cx="256" cy="256" r="240" fill="url(#meshGlow)" />

  <g transform="translate(141, 141)" stroke="url(#glowGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Radix / Hexagonal Nodes Mesh representing computers/bases -->
    <polygon points="115,0 230,66 230,198 115,264 0,198 0,66" stroke-opacity="0.3" />
    
    <!-- Central connection network -->
    <path d="M 115,0 L 115,264" stroke-opacity="0.2" />
    <path d="M 0,66 L 230,198" stroke-opacity="0.2" />
    <path d="M 0,198 L 230,66" stroke-opacity="0.2" />

    <!-- Active accent routes -->
    <path d="M 115,0 L 230,66 L 230,198 L 115,264" stroke-width="26" />
    <circle cx="115" cy="0" r="18" fill="#1e1b4b" stroke-width="12" />
    <circle cx="230" cy="66" r="18" fill="#1e1b4b" stroke-width="12" />
    <circle cx="230" cy="198" r="18" fill="#1e1b4b" stroke-width="12" />
    <circle cx="115" cy="264" r="18" fill="#1e1b4b" stroke-width="12" />
    
    <!-- Intersecting core processor circle -->
    <circle cx="115" cy="132" r="50" fill="#090d1f" stroke-width="18" />
    <!-- Binary '1' and '0' stylistic indicator inside the central processor -->
    <text x="115" y="142" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="34" font-weight="900" fill="#f8fafc" text-anchor="middle" stroke="none">R</text>
  </g>
</svg>
